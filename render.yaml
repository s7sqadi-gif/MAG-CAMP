services:
  - type: web
    name: mag-camp
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 4 --timeout 120 --access-logfile - --error-logfile - wsgi:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SECRET_KEY
        generateValue: true
