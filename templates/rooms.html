{% extends "base.html" %}
{% block content %}
<form class="search">
  <input name="q" value="{{q}}" placeholder="رقم الغرفة">
  <button>بحث</button>
</form>
<div class="grid">
  {% for r in rooms %}
    <a href="/room/{{r.room_no}}" class="room {% if r.room_no in inspected %}done{% endif %}">
      <b>غرفة {{r.room_no}}</b>
      <span>المسجل: {{r.occ}} / السعة: {{r.capacity}}</span>
      {% if r.room_no in inspected %}<small>تمت الجولة هذا الأسبوع</small>{% endif %}
    </a>
  {% endfor %}
</div>
{% endblock %}
